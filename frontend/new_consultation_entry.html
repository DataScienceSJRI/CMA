<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>New Consultation Entry Form</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#F6C23E", // The distinct yellow from the screenshot
              "primary-hover": "#DDA20A",
              "background-light": "#FFFBE6", // Very pale yellow/cream for light mode bg
              "background-dark": "#1F2937", // Dark gray for dark mode
              "card-light": "#FFFFFF",
              "card-dark": "#374151",
              "border-light": "#E5E7EB",
              "border-dark": "#4B5563",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 transition-colors duration-200"
  >
    <div
      class="bg-card-light dark:bg-card-dark w-full max-w-lg rounded-xl shadow-xl border border-primary/20 dark:border-primary/10 overflow-hidden relative"
    >
      <div class="h-2 bg-primary w-full"></div>
      <div class="p-8">
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/20 text-primary mb-4"
          >
            <span class="material-icons text-2xl">edit_note</span>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
            New Entry Form
          </h1>
          <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">
            Log a new consultation session details below.
          </p>
        </div>
        <form action="#" class="space-y-5" method="POST">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="date"
            >
              Date <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons text-gray-400 text-sm"
                  >calendar_today</span
                >
              </div>
              <input
                class="pl-10 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-500 transition-colors"
                id="date"
                name="date"
                required=""
                type="date"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="gname"
            >
              Guest Name <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons text-gray-400 text-sm">person</span>
              </div>
              <input
                class="pl-10 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-500 transition-colors"
                id="gname"
                name="gname"
                placeholder="e.g. Dr. John Doe"
                required=""
                type="text"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="profession"
            >
              Profession <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons text-gray-400 text-sm">work</span>
              </div>
              <select
                class="pl-10 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm transition-colors"
                id="profession"
                name="profession"
                required=""
              >
                <option disabled="" selected="" value="">
                  Select a profession
                </option>
                <option>PhD Student</option>
                <option>Medical Doctor</option>
                <option>Nursing Staff</option>
                <option>Researcher</option>
                <option>Faculty</option>
                <option>Other</option>
              </select>
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="department"
            >
              Department <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons text-gray-400 text-sm">domain</span>
              </div>
              <input
                class="pl-10 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-500 transition-colors"
                id="department"
                name="department"
                placeholder="e.g. Cardiology"
                required=""
                type="text"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="reason"
            >
              Reason <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-icons text-gray-400 text-sm"
                  >help_outline</span
                >
              </div>
              <select
                class="pl-10 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm transition-colors"
                id="reason"
                name="reason"
                required=""
              >
                <option disabled="" selected="" value="">
                  Select reason for consultation
                </option>
                <option>Sample Size Calculation</option>
                <option>Study Design</option>
                <option>Data Analysis</option>
                <option>Interpretation of Results</option>
                <option>Grant Proposal</option>
                <option>Publication Review</option>
              </select>
            </div>
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              for="description"
            >
              Description <span class="text-red-500">*</span>
            </label>
            <div class="relative rounded-md shadow-sm">
              <textarea
                class="block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-500 transition-colors"
                id="description"
                name="description"
                placeholder="Brief description of the statistical problem..."
                required=""
                rows="3"
              ></textarea>
            </div>
          </div>
          <div class="pt-4">
            <button
              class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-gray-900 bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:-translate-y-0.5"
              type="submit"
            >
              Submit Entry
            </button>
          </div>
        </form>
      </div>
      <div
        class="bg-gray-50 dark:bg-gray-800 px-8 py-4 border-t border-gray-100 dark:border-gray-700 flex justify-between items-center text-xs text-gray-500 dark:text-gray-400"
      >
        <span>Biostatistics Dept.</span>
        <span>© 2023 HOD System</span>
      </div>
    </div>
    <button
      aria-label="Toggle Dark Mode"
      class="fixed bottom-4 right-4 p-3 rounded-full bg-white dark:bg-gray-800 text-gray-800 dark:text-white shadow-lg border border-gray-200 dark:border-gray-700 hover:scale-110 transition-transform focus:outline-none"
      onclick="document.documentElement.classList.toggle('dark')"
    >
      <span class="material-icons dark:hidden">dark_mode</span>
      <span class="material-icons hidden dark:block">light_mode</span>
    </button>
  </body>
</html>
