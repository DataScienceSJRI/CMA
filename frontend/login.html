<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CMS Login - Biostatistics &amp; Data Science</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0d9488", // Medical Teal
                        "primary-hover": "#0f766e",
                        "background-light": "#f3f4f6",
                        "background-dark": "#111827",
                        "card-light": "#ffffff",
                        "card-dark": "#1f2937",
                        "text-main-light": "#111827",
                        "text-main-dark": "#f9fafb",
                        "text-sub-light": "#6b7280",
                        "text-sub-dark": "#9ca3af",
                        "border-light": "#e5e7eb",
                        "border-dark": "#374151",
                        "input-bg-light": "#ffffff",
                        "input-bg-dark": "#374151",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'glow': '0 0 15px rgba(13, 148, 136, 0.3)',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary bg-opacity-10 dark:bg-opacity-20 mb-4">
<span class="material-icons-round text-primary text-4xl">analytics</span>
</div>
<h1 class="text-2xl font-bold text-text-main-light dark:text-text-main-dark tracking-tight">
                Consultation Management System
            </h1>
<p class="text-sm text-text-sub-light dark:text-text-sub-dark mt-2">
                Department of Biostatistics &amp; Data Science
            </p>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-xl shadow-xl border border-border-light dark:border-border-dark overflow-hidden transition-colors duration-300">
<div class="p-8">
<div class="mb-6">
<h2 class="text-xl font-semibold text-text-main-light dark:text-text-main-dark">
                        Welcome back
                    </h2>
<p class="text-sm text-text-sub-light dark:text-text-sub-dark mt-1">
                        Please enter your credentials to access the dashboard.
                    </p>
</div>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark mb-1.5" for="username">
                            Username or ID
                        </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-text-sub-light dark:text-text-sub-dark text-xl">person_outline</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-border-light dark:border-border-dark rounded-lg bg-input-bg-light dark:bg-input-bg-dark text-text-main-light dark:text-text-main-dark placeholder-text-sub-light dark:placeholder-text-sub-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200 sm:text-sm" id="username" name="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="password">
                                Password
                            </label>
<a class="text-sm font-medium text-primary hover:text-primary-hover hover:underline" href="#">
                                Forgot password?
                            </a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-text-sub-light dark:text-text-sub-dark text-xl">lock_outline</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-border-light dark:border-border-dark rounded-lg bg-input-bg-light dark:bg-input-bg-dark text-text-main-light dark:text-text-main-dark placeholder-text-sub-light dark:placeholder-text-sub-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200 sm:text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                        Sign In
                    </button>
</form>
</div>
<div class="px-8 py-4 bg-gray-50 dark:bg-gray-800 border-t border-border-light dark:border-border-dark flex justify-center text-sm">
<span class="text-text-sub-light dark:text-text-sub-dark">
                    Need help? <a class="font-medium text-primary hover:text-primary-hover hover:underline ml-1" href="#">Contact Support</a>
</span>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-xs text-text-sub-light dark:text-text-sub-dark">
                © 2023 Biostatistics Department. All rights reserved.
            </p>
</div>
</div>
<div class="fixed bottom-4 right-4">
<button class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-lg text-text-sub-light dark:text-text-sub-dark hover:text-primary transition-colors focus:outline-none border border-border-light dark:border-border-dark" id="theme-toggle">
<span class="material-icons-round dark:hidden">dark_mode</span>
<span class="material-icons-round hidden dark:block">light_mode</span>
</button>
</div>
<script>
        // Simple dark mode toggle script
        const toggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        // Check system preference on load
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }
        toggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
        });
    </script>

</body></html>
